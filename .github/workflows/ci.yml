name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Build and smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Sync
        run: uv sync --locked

      - name: Compile
        run: uv run python -m compileall src

      - name: CLI help
        run: uv run usst-rollcall --help

      - name: Build
        run: uv build
